name: Deploy Worker

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Notify build result
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            TITLE="âś… Zzza Build Passed"
            PRIORITY="0"
          else
            TITLE="âťŚ Zzza Build Failed"
            PRIORITY="1"
          fi

          RESPONSE=$(curl --fail-with-body --silent --show-error \
            --form-string "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --form-string "title=$TITLE" \
            --form-string "message=Build $STATUS on ${{ github.ref_name }} â€” ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --form-string "priority=$PRIORITY" \
            https://api.pushover.net/1/messages.json \
            || echo "::warning::Pushover notification failed")

          echo "$RESPONSE"

  deploy-worker:
    name: Deploy Cloudflare Worker
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.73.0"
          command: deploy --config worker/wrangler.jsonc

      - name: Notify deploy result
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            TITLE="âś… Zzza Deploy Passed"
            PRIORITY="0"
          else
            TITLE="âťŚ Zzza Deploy Failed"
            PRIORITY="1"
          fi

          RESPONSE=$(curl --fail-with-body --silent --show-error \
            --form-string "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --form-string "title=$TITLE" \
            --form-string "message=Deploy $STATUS on ${{ github.ref_name }} â€” ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --form-string "priority=$PRIORITY" \
            https://api.pushover.net/1/messages.json \
            || echo "::warning::Pushover notification failed")

          echo "$RESPONSE"