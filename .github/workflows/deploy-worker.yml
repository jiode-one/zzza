name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Notify CI result
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            TITLE="✅ Zzza CI Passed"
            PRIORITY="0"
          else
            TITLE="❌ Zzza CI Failed"
            PRIORITY="1"
          fi

          curl -s \
            --form-string "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
            --form-string "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --form-string "title=$TITLE" \
            --form-string "message=Build $STATUS on ${{ github.ref_name }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --form-string "priority=$PRIORITY" \
            https://api.pushover.net/1/messages.json